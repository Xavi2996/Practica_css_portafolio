<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portafolio Xavier Cobos</title>
    <link
      rel="stylesheet"
      href="assets/fonts/fontawesome-free-6.1.2-web/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/scroll.css" />
    <link href="assets/fonts/poppins/poppins.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/reset.css" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <!-- Layout principal -->
    <div class="layout">
      <!-- Barra lateral (info Usuario) -->
      <aside class="layout__aside">
        <section class="aside__user-info">
          <!-- informacion general -->
          <div class="user-info__general">
            <div class="user-info__container-image">
              <img
                class="user-info__image"
                src="assets/img/default-user.jpeg"
                alt="Foto de perfil de Xavier Cobos"
              />
            </div>
            <h2 class="user-info__name">Xavier Cobos</h2>
            <h4 class="user-info__job">Desarrollador Web</h4>
          </div>
          <!-- menu de navegacion -->
          <nav class="layout__menu">
            <ul class="menu__list">
              <li class="menu__option">
                <a href="index.html" class="menu__link">
                  <i class="menu__icon fa-solid fa-house"></i>
                  <span class="menu__overlay">Home</span>
                </a>
              </li>
              <li class="menu__option">
                <a href="sobre-mi.html" class="menu__link">
                  <i class="menu__icon fa-solid fa-user"></i>
                  <span class="menu__overlay">Sobre mí</span>
                </a>
              </li>
              <li class="menu__option">
                <a href="estudios.html" class="menu__link">
                  <i class="menu__icon fa-solid fa-graduation-cap"></i>
                  <span class="menu__overlay">Currículum</span>
                </a>
              </li>
              <li class="menu__option">
                <a href="portafolio.html" class="menu__link">
                  <i class="menu__icon fa-solid fa-briefcase"></i>
                  <span class="menu__overlay">Portafolio</span>
                </a>
              </li>
              <li class="menu__option">
                <a href="blog.html" class="menu__link">
                  <i class="menu__icon fa-solid fa-book"></i>
                  <span class="menu__overlay">Blog</span>
                </a>
              </li>
              <li class="menu__option">
                <a href="contacto.html" class="menu__link menu__link--active">
                  <i class="menu__icon fa-solid fa-envelope"></i>
                  <span class="menu__overlay">Contacto</span>
                </a>
              </li>
            </ul>
          </nav>
          <!-- Links a redes sociales -->
          <div class="user-info__links">
            <ul class="links__social">
              <li class="social__option">
                <a class="social_link">
                  <i class="social__icon fa-brands fa-youtube"></i>
                </a>
              </li>
              <li class="social__option">
                <a class="social_link">
                  <i class="social__icon fa-brands fa-linkedin"></i>
                </a>
              </li>
              <li class="social__option">
                <a class="social_link">
                  <i class="social__icon fa-brands fa-instagram"></i>
                </a>
              </li>
            </ul>
          </div>
          <!-- boton de curricullum vitae -->
          <div class="user-info__buttons">
            <a href="" class="user-info__btn"> Descargar CV </a>
          </div>
          <!-- pie de pagina -->

          <footer class="user-info__footer">
            &copy; 2026 Xavier Cobos WEB
          </footer>
        </section>
      </aside>

      <!-- Contenido Principal -->
      <main class="layout__content">
        <section class="content__page content__contact">
          <header class="contact__header">
            <h1 class="contact__title">Contacto</h1>
          </header>

          <div class="contact__container">
            <section class="contact__info">
              <div class="contact__data">
                <i class="contact__icon fa-solid fa-location-dot"></i>
                <h2 class="contact__subtitle">Quito</h2>
              </div>
              <div class="contact__data">
                <i class="contact__icon fa-solid fa-phone"></i>
                <h2 class="contact__subtitle">+593 123 456 789</h2>
              </div>
              <div class="contact__data">
                <i class="contact__icon fa-solid fa-envelope"></i>
                <h2 class="contact__subtitle">email@example.com</h2>
              </div>
              <div class="contact__data">
                <i class="contact__icon fa-solid fa-circle-check"></i>
                <h2 class="contact__subtitle">Developer</h2>
              </div>
            </section>
            <section class="contact__form-box">
              <div class="contact__map">
                <!-- <iframe
                  frameborder="0"
                  scrolling="no"
                  marginheight="0"
                  marginwidth="0"
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d9548.504759132835!2d-78.48689822428226!3d-0.1755415354223138!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x91d59a853f53c479%3A0x876b841e50817a25!2sCentro%20Comercial%20Naciones%20Unidas%20(CCNU)!5e1!3m2!1ses!2sec!4v1782919134634!5m2!1ses!2sec"
                  style="border: 0"
                  loading="lazy"
                  referrerpolicy="strict-origin-when-cross-origin"
                ></iframe> -->
              </div>

              <header class="contact__form-header">
                <h3 class="form-header__title">
                  ¿Cómo puedo <span class="title__color">ayudarte?</span>
                </h3>
              </header>

              <form class="contact__form">
                <div class="form__container">
                  <section class="form__left">
                    <div class="form__group">
                      <input
                        type="text"
                        class="form__input"
                        required
                        placeholder="Nombre"
                        name="name"
                      />
                      <label for="name" class="form__label">Nombre</label>
                    </div>
                    <div class="form__group">
                      <input
                        type="email"
                        class="form__input"
                        required
                        placeholder="Email"
                        name="email"
                      />
                      <label for="email" class="form__label">Email</label>
                    </div>
                    <div class="form__group">
                      <input
                        type="text"
                        class="form__input"
                        required
                        placeholder="Asunto"
                        name="subject"
                      />
                      <label for="subject" class="form__label">Asunto</label>
                    </div>
                  </section>
                  <section class="form__right">
                    <div class="form__group">
                      <textarea
                        name="message"
                        class="form__input form__input--textarea"
                        required
                        placeholder="Mensaje"
                      ></textarea>
                      <label for="message" class="form__label">Mensaje</label>
                    </div>
                  </section>
                </div>
                <input
                  type="submit"
                  value="Enviar Mensaje"
                  class="form__button"
                />
              </form>
            </section>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
